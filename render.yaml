services:
  - type: web
    name: student-result-django
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn student_result_django.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: student-db
    databaseName: student_result
    user: student_user
