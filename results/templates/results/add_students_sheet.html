<!DOCTYPE html>
<html>
<head>
    <title>Add Students — Semester {{ semester_id }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@12.3.3/dist/handsontable.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable@12.3.3/dist/handsontable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; min-height: 100vh; }
        .navbar {
            background: #0d1b2a; padding: 0 28px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .nav-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .nav-title { color: #fff; font-size: 14px; font-weight: 600; }
        .nav-title small { color: rgba(255,255,255,0.45); font-size: 10px; display: block; }
        .nav-back {
            color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;
            padding: 7px 14px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.15);
            transition: background 0.2s;
        }
        .nav-back:hover { background: rgba(255,255,255,0.1); color: #f59e0b; }
        .content { padding: 24px 28px; }
        .page-header {
            background: #fff; border-radius: 12px; padding: 18px 22px; margin-bottom: 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .page-header h2 { font-size: 17px; font-weight: 700; color: #0d1b2a; }
        .page-header p  { font-size: 12px; color: #64748b; margin-top: 3px; }
        .save-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff; border: none; border-radius: 8px;
            font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(245,158,11,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .save-btn:hover { transform: translateY(-2px); }
        .table-card {
            background: #fff; border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden;
        }
        .msg-toast {
            display: none; position: fixed; bottom: 28px; right: 28px;
            padding: 14px 22px; border-radius: 10px; font-size: 14px; font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999;
        }
        .msg-toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .msg-toast.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <div class="nav-icon">✏️</div>
        <div class="nav-title">
            Add Students — Semester {{ semester_id }}
            <small>C. Abdul Hakeem College (Autonomous)</small>
        </div>
    </div>
    <a href="/admin-panel/dashboard" class="nav-back">← Dashboard</a>
</nav>

<div class="content">
    <div class="page-header">
        <div>
            <h2>Student Entry Sheet</h2>
            <p>Semester {{ semester_id }} — Enter register number, name and date of birth</p>
        </div>
        <button class="save-btn" onclick="saveStudents()">💾 Save Students</button>
    </div>
    <div class="table-card">
        <div id="studentSheet"></div>
    </div>
</div>

<div id="toast" class="msg-toast"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('studentSheet');
        const studentsData = JSON.parse('{{ students_json|escapejs }}');
        
        window.hot = new Handsontable(container, {
            data: studentsData,
            colHeaders: ['Register No', 'Name', 'DOB (YYYY-MM-DD)'],
            rowHeaders: true, 
            minRows: 1,
            minSpareRows: 1,
            height: 'auto',
            maxHeight: 600,
            columns: [{ type: 'text' }, { type: 'text' }, { type: 'text' }],
            stretchH: 'all',
            licenseKey: 'non-commercial-and-evaluation'
        });
    });

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'msg-toast ' + type;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3500);
    }

    function saveStudents() {
        fetch("/save-students-api/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
            body: JSON.stringify({
                data: window.hot.getData(),
                department_id: "{{ department_id|escapejs }}",
                year_id: "{{ year_id|escapejs }}",
                semester_id: "{{ semester_id|escapejs }}"
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") showToast("✅ " + (data.message || "Students saved!"), "success");
            else showToast("❌ " + (data.error || "Unknown error"), "error");
        })
        .catch(() => showToast("❌ Network error.", "error"));
    }
</script>
</body>
</html>
